# Visit https://github.com/lowlighter/metrics#-documentation for full reference
name: GitHub Metrics

on:
  # Schedule updates (daily at midnight UTC)
  schedule:
    - cron: '0 0 * * *'

  # Allow manual triggering of the workflow
  workflow_dispatch:

  # Trigger the workflow on pushes to the main branch
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment: production

    # Define minimal required permissions for security
    permissions:
      contents: write
      issues: read
      pull-requests: read
      actions: read
      discussions: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1 # Fetch only the latest commit for faster performance

      - name: Fix Docker installation conflicts
        run: |
          sudo apt-get remove -y containerd docker.io containerd.io
          sudo apt-get update
          sudo apt-get install -y docker.io jq

      - name: Generate Comprehensive GitHub Metrics
        uses: lowlighter/metrics@master
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: rbcmgs
          template: classic
          base: header, activity, community, repositories, metadata
          base_indepth: true
          base_hireable: true
          config_octicon: true
          config_timezone: America/New_York
          config_twemoji: true
          config_display: large

          # Achievements plugin - showcase milestones
          plugin_achievements: true
          plugin_achievements_display: detailed
          plugin_achievements_secrets: true
          plugin_achievements_threshold: C

          # Languages plugin - detailed language usage
          plugin_languages: true
          plugin_languages_analysis_timeout: 60
          plugin_languages_categories: data, markup, programming, prose
          plugin_languages_colors: github
          plugin_languages_details: percentage, bytes-size
          plugin_languages_ignored: SVG, robots.txt, HTML
          plugin_languages_indepth: true
          plugin_languages_limit: 12
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

          # Isometric calendar - 3D contribution calendar
          plugin_isocalendar: true
          plugin_isocalendar_duration: full-year

          # Habits plugin - coding habits and activity charts
          plugin_habits: true
          plugin_habits_charts: true
          plugin_habits_charts_type: classic
          plugin_habits_days: 30
          plugin_habits_facts: true
          plugin_habits_from: 1000
          plugin_habits_languages_limit: 8
          plugin_habits_languages_threshold: 0%

          # Notable contributions
          plugin_notable: true
          plugin_notable_from: organization
          plugin_notable_indepth: true
          plugin_notable_repositories: true
          plugin_notable_types: commit, pull_request, issue

          # Activity plugin - recent activity
          plugin_activity: true
          plugin_activity_days: 30
          plugin_activity_filter: all
          plugin_activity_limit: 5
          plugin_activity_load: 1000
          plugin_activity_timestamps: true
          plugin_activity_visibility: public

          # Code time and habits
          plugin_code: true
          plugin_code_days: 7
          plugin_code_lines: 50
          plugin_code_load: 1000
          plugin_code_visibility: public

          # Traffic - repository views
          plugin_traffic: true

          # Follow-up issues and PRs
          plugin_followup: true
          plugin_followup_indepth: true
          plugin_followup_sections: user

          # Lines of code changed
          plugin_lines: true
          plugin_lines_history_limit: 3
          plugin_lines_repositories_limit: 10
          plugin_lines_sections: repositories, history

          # Topics - favorite topics
          plugin_topics: true
          plugin_topics_limit: 20
          plugin_topics_mode: icons
          plugin_topics_sort: stars

          # Stars plugin - starred repositories
          plugin_stars: true
          plugin_stars_limit: 6

        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}

      - name: Commit and Push Metrics
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: '📈 Update GitHub metrics [skip ci]'
          branch: main
          file_pattern: 'github-metrics.svg'
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
